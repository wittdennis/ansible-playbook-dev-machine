# code: language=ansible
---
- name: Set download url
  ansible.builtin.set_fact:
    ente_auth_appimage_download_url: "https://github.com/ente-io/ente/releases/download/auth-{{ ente_auth_appimage_version }}/ente-auth-{{ ente_auth_appimage_version }}-x86_64.AppImage"

- name: Download ente-auth AppImage
  ansible.builtin.get_url:
    url: "{{ ente_auth_appimage_download_url }}"
    dest: /tmp/ente-auth.AppImage
    mode: "0755"
    force: true

- name: Install ente-auth
  changed_when: install_ente_auth.rc == 0
  ansible.builtin.command:
    cmd: "install /tmp/ente-auth.AppImage {{ ansible_facts['user_dir'] }}/.local/bin/EnteAuth.AppImage"
  register: install_ente_auth

- name: Template .desktop file
  ansible.builtin.template:
    src: templates/ente-auth.desktop.j2
    dest: "/tmp/ente-auth.desktop"
    mode: "0644"

- name: Ensure icons directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.local/share/icons/hicolor/scalable/apps"
    state: directory
    mode: "0755"

- name: Copy ente-auth icon
  ansible.builtin.copy:
    src: files/ente-auth-icon.svg
    dest: "{{ ansible_facts['user_dir'] }}/.local/share/icons/hicolor/scalable/apps/ente-auth-icon.svg"
    force: true
    mode: "0644"

- name: Ensure index.theme
  ansible.builtin.copy:
    content: "{{ icon_index_theme_file }}"
    dest: "{{ ansible_facts['user_dir'] }}/.local/share/icons/hicolor/index.theme"
    mode: "0644"

- name: Update gtk icon cache
  changed_when: update_icon_cache.rc == 0
  ansible.builtin.command:
    cmd: "gtk-update-icon-cache {{ ansible_facts['user_dir'] }}/.local/share/icons/hicolor"
  register: update_icon_cache

- name: Install desktop file
  changed_when: install_desktop_file.rc == 0
  ansible.builtin.command:
    cmd: "desktop-file-install --dir={{ ansible_facts['user_dir'] }}/.local/share/applications /tmp/ente-auth.desktop"
  register: install_desktop_file

- name: Remove downloaded AppImage
  ansible.builtin.file:
    path: /tmp/ente-auth.AppImage
    state: absent
